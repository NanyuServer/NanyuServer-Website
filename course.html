<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>南渝万能墙公益课程—剪辑软件进阶教程</title>
<style>
  @font-face {
    font-family: 'OPPO Sans';
    src: url('OPPO Sans 4.0.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0818;
    --panel: rgba(18, 10, 35, 0.95);
    --text: #f0e6ff;
    --sub: #aea3db;
    --accent: #e8c97a;
    --border: rgba(123,85,212,0.25);
    --font: 'OPPO Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body {
    min-height: 100vh;
    font-family: var(--font);
    background: radial-gradient(circle at top, rgba(75,47,163,0.28), transparent 28%),
                radial-gradient(circle at 20% 20%, rgba(232,111,163,0.12), transparent 24%),
                linear-gradient(180deg, #12082a 0%, #0d0818 100%);
    color: var(--text);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
  }
  .page-wrap {
    position: relative;
    max-width: 1120px;
    margin: 0 auto;
    padding: 4rem 1.5rem 3rem;
  }
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 2.5rem 1.5rem;
    background: rgba(15, 9, 29, 0.95);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.22);
  }
  .header h1 {
    font-size: clamp(2rem, 4vw, 3.4rem);
    line-height: 1.05;
    letter-spacing: 0.03em;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, var(--accent), #d4b8f5, #f0e6ff);
    -webkit-background-clip: text;
    color: transparent;
  }
  .header p {
    font-size: 1rem;
    color: var(--sub);
    max-width: 760px;
    margin: 0 auto;
    line-height: 1.8;
  }
  .pdf-panel {
    position: relative;
    min-height: 760px;
    background: rgba(14, 9, 27, 0.98);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.32);
  }
  .pdf-panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    min-height: 760px;
  }
  .pdf-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    color: var(--text);
    background: rgba(13, 8, 24, 0.92);
    backdrop-filter: blur(4px);
  }
  .pdf-fallback a {
    color: var(--accent);
    text-decoration: underline;
  }
  @media (max-width: 768px) {
    .page-wrap { padding: 3rem 1rem 2rem; }
    .header { padding: 2rem 1rem; }
    .header h1 { font-size: 2.4rem; }
    .pdf-panel { min-height: 520px; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <section class="header">
    <h1>南渝万能墙公益课程—剪辑软件进阶教程</h1>
    <p>南渝万能墙版权所有 未经允许任何人不得转载商用和署名</p>
  </section>
  <section class="pdf-panel">
    <iframe src="class.pdf" title="南渝万能墙公益课程—剪辑软件进阶教程 PDF 预览"></iframe>
    <div class="pdf-fallback">
      <div>
        当前浏览器无法直接预览 PDF。<br />
        请点击下方链接下载查看：<br />
        <a href="class.pdf" target="_blank" rel="noopener noreferrer">下载 PDF 文件</a>
      </div>
    </div>
  </section>
</div>
</body>
</html>
