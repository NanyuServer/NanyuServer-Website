<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>公益课程 — 南渝万能墙</title>
<style>
  @font-face {
    font-family: 'OPPO Sans';
    src: url('OPPO Sans 4.0.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --p1: #0d0818; --p2: #1a0e3a; --p3: #2d1b6b; --p4: #4c2fa3;
    --p5: #7b55d4; --p6: #a87fe8; --p7: #d4b8f5; --p8: #f0e6ff;
    --gold: #e8c97a; --gold2: #f5dfa0; --rose: #e86fa3; --teal: #5de8d0;
    --font-title: 'OPPO Sans', sans-serif;
    --font-body: 'OPPO Sans', sans-serif;
    --font-ui: 'OPPO Sans', sans-serif;
    --border: rgba(123,85,212,0.15);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-ui);
    background: var(--p1);
    color: var(--p8);
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1000;
    opacity:0.02;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 3rem 1rem 4px;
    backdrop-filter: blur(20px);
    background: linear-gradient(180deg, rgba(13,8,24,0.85) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; margin-left: 0; }
  .logo img { display:block; height:3.2rem; width:auto; transform: translateX(40px); }
  .nav-links { display:flex; gap:2.2rem; list-style:none; }
  .nav-links a { font-family: var(--font-ui); color: var(--p6); text-decoration:none; font-size:0.82rem; letter-spacing:0.06em; position:relative; }
  .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; right:0; height:1px; background:var(--gold); transform:scaleX(0); transform-origin:right; transition:transform 0.4s ease; }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform:scaleX(1); transform-origin:left; }
  .nav-cta { font-family: var(--font-ui); padding:0.55rem 1.4rem; border:1px solid var(--p5); background:transparent; color:var(--p7); font-size:0.8rem; letter-spacing:0.06em; cursor:pointer; border-radius:2px; transition:all 0.3s; position:relative; overflow:hidden; }
  .nav-cta::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--p4),var(--rose)); opacity:0; transition:opacity 0.3s; }
  .nav-cta:hover::before { opacity:1; }
  .nav-cta span { position:relative; z-index:1; }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; background:none; border:none; z-index:600; }
  .hamburger span { display:block; width:24px; height:2px; background:var(--p7); border-radius:2px; transition:all 0.3s ease; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity:0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-nav { display:none; position:fixed; inset:0; z-index:490; background:rgba(13,8,24,0.97); backdrop-filter:blur(20px); flex-direction:column; align-items:center; justify-content:center; gap:2.5rem; opacity:0; transition:opacity 0.35s ease; }
  .mobile-nav.open { display:flex; opacity:1; }
  .mobile-nav a { font-family: var(--font-ui); font-size:1.4rem; color:var(--p7); text-decoration:none; letter-spacing:0.08em; padding:0.5rem 2rem; border-bottom:1px solid rgba(123,85,212,0.2); width:100%; text-align:center; }
  .mobile-nav a:hover { color:var(--gold); }
  .page-hero { padding:7rem 2rem 2.5rem; background: linear-gradient(180deg, var(--p2) 0%, var(--p1) 100%); position:relative; overflow:hidden; text-align:center; }
  .page-hero::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(75,47,163,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(75,47,163,0.07) 1px, transparent 1px); background-size:60px 60px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%); }
  .page-orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; top:-80px; left:50%; transform:translateX(-50%); width:600px; height:400px; background:radial-gradient(circle, rgba(75,47,163,0.5) 0%, rgba(232,111,163,0.2) 50%, transparent 70%); }
  .page-hero-content { position:relative; z-index:2; }
  .page-label { display:inline-flex; align-items:center; gap:0.6rem; font-family:var(--font-ui); font-size:0.7rem; letter-spacing:0.2em; color:var(--gold); margin-bottom:1rem; }
  .page-label::before, .page-label::after { content:''; display:block; width:20px; height:1px; background:var(--gold); }
  .page-title { font-family:var(--font-title); font-size:clamp(2rem,5vw,3.5rem); font-weight:700; letter-spacing:0.04em; background:linear-gradient(135deg,var(--gold),var(--p7),var(--p6)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.8rem; }
  .page-sub { font-family:var(--font-body); color:var(--p6); font-size:0.95rem; letter-spacing:0.06em; }
  .content-section { max-width:1100px; margin:0 auto; padding:3rem 2rem; }
  .info-card { background: linear-gradient(135deg, rgba(29,14,58,0.9), rgba(45,27,107,0.5)); border:1px solid rgba(123,85,212,0.25); border-radius:12px; padding:2rem; margin-bottom:2rem; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .info-title { font-family:var(--font-title); font-size:1.2rem; font-weight:700; color:var(--gold); margin-bottom:1rem; }
  .info-text { font-family:var(--font-body); font-size:0.95rem; line-height:1.8; color:var(--p7); }
  .course-preview { display:flex; flex-direction:column; gap:1rem; }
  .course-preview h2 { font-family:var(--font-title); font-size:1.35rem; color:var(--p8); margin-bottom:0.5rem; }
  .course-preview p { font-size:0.95rem; color:var(--p6); line-height:1.75; }
  .pdf-frame { position:relative; min-height:720px; height:min(84vh, 920px); border:1px solid rgba(123,85,212,0.25); border-radius:18px; overflow:hidden; background:rgba(10,7,22,0.95); }
  .pdf-frame object, .pdf-frame iframe { width:100%; height:100%; border:none; display:block; }
  .pdf-fallback { display:flex; align-items:center; justify-content:center; width:100%; height:100%; padding:2rem; text-align:center; color:var(--p8); background:rgba(13,8,24,0.9); }
  .pdf-fallback a { color:var(--gold); text-decoration:underline; }
  footer { padding:2.5rem 2rem; text-align:center; border-top:1px solid rgba(75,47,163,0.2); }
  .footer-copy { font-family:var(--font-body); font-size:0.73rem; color:var(--p5); letter-spacing:0.06em; }
  @media (max-width:768px) {
    nav { padding:1rem 1.5rem; background:rgba(13,8,24,0.96); }
    .nav-links, .nav-cta { display:none; }
    .hamburger { display:flex; }
    .page-hero { padding:7rem 1.25rem 3rem; }
    .content-section { padding:2rem 1.25rem; }
    .pdf-frame { min-height:520px; }
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="mobile-nav" id="mobileNav">
  <a href="index.html" onclick="closeMobileNav()">返回首页</a>
  <a href="query.html" onclick="closeMobileNav()">稿件查询</a>
  <a href="recruit.html" onclick="closeMobileNav()">招贤纳士</a>
  <a href="course.html" onclick="closeMobileNav()">公益课程</a>
  <a href="about.html" onclick="closeMobileNav()">关于我们</a>
  <button class="mobile-cta" onclick="window.location.href='https://qm.qq.com/q/FHAbiDBIQO'" style="padding:0.9rem 2.8rem;background:linear-gradient(135deg,var(--p4),var(--rose));color:white;border:none;border-radius:4px;font-family:var(--font-ui);font-size:1rem;letter-spacing:0.08em;">立即进入</button>
</div>
<nav>
  <div class="logo">
    <img src="https://www.image2url.com/r2/default/images/1777186784039-1bad113d-14f6-4391-a713-9dbdfbeb9cd8.png" alt="南渝万能墙 logo">
  </div>
  <ul class="nav-links">
    <li><a href="index.html">返回主页</a></li>
    <li><a href="query.html">稿件查询</a></li>
    <li><a href="recruit.html">招贤纳士</a></li>
    <li><a href="course.html" class="active">公益课程</a></li>
    <li><a href="about.html">关于我们</a></li>
  </ul>
  <button class="nav-cta" onclick="window.location.href='https://qm.qq.com/q/FHAbiDBIQO'"><span>立即进入</span></button>
  <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="page-hero">
  <div class="page-orb"></div>
  <div class="page-hero-content">
    <div class="page-label">学习资源</div>
    <h1 class="page-title">公益课程</h1>
    <p class="page-sub">汇聚优质教学资源，为学生提供免费学习支持</p>
  </div>
</div>
<div class="content-section">
  <div class="info-card course-preview">
    <h2>《南渝万能墙公益课程—剪辑软件进阶教程》</h2>
    <p>南渝万能墙版权所有 未经允许任何人不得转载商用和署名</p>
    <div class="pdf-frame">
      <object data="https://videotourl.com/documents/1777475377797-4308193f-0dd7-4ebf-a2fc-f5abceadccd4.pdf" type="application/pdf" width="100%" height="100%">
        <iframe src="https://videotourl.com/documents/1777475377797-4308193f-0dd7-4ebf-a2fc-f5abceadccd4.pdf" width="100%" height="100%" title="PDF 预览">
          <div class="pdf-fallback">
            当前浏览器无法直接预览 PDF。<br />
            请 <a href="https://videotourl.com/documents/1777475377797-4308193f-0dd7-4ebf-a2fc-f5abceadccd4.pdf" target="_blank" rel="noopener noreferrer">点击这里下载</a> 继续查看。
          </div>
        </iframe>
      </object>
    </div>
  </div>
</div>
<footer>
  <div class="footer-copy">© 2026 南渝万能墙运营队 · 保留所有权利</div>
</footer>
<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCursor(){ rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; cursor.style.left = mx + 'px'; cursor.style.top = my + 'px'; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(animCursor); })();
function toggleMobileNav(){ const n = document.getElementById('mobileNav'), b = document.getElementById('hamburger'); n.classList.toggle('open'); b.classList.toggle('open'); }
function closeMobileNav(){ document.getElementById('mobileNav').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); }
</script>
</body>
</html>
