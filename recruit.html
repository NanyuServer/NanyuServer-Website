<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>招贤纳士 — 南渝万能墙</title>
<style>
  @font-face {
    font-family: 'OPPO Sans';
    src: url('OPPO Sans 4.0.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --p1: #0d0818; --p2: #1a0e3a; --p3: #2d1b6b; --p4: #4c2fa3;
    --p5: #7b55d4; --p6: #a87fe8; --p7: #d4b8f5; --p8: #f0e6ff;
    --gold: #e8c97a; --gold2: #f5dfa0; --rose: #e86fa3; --teal: #5de8d0;
    --easing: cubic-bezier(0.16, 1, 0.3, 1);
    --font-title: 'OPPO Sans', sans-serif;
    --font-body: 'OPPO Sans', sans-serif;
    --font-ui: 'OPPO Sans', sans-serif;
  }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; -moz-osx-font-smoothing: grayscale; -webkit-font-smoothing: antialiased; }

  body { text-rendering: optimizeLegibility; line-height: 1.65; }

  body {
    font-family: var(--font-body);
    background: var(--p1);
    line-height: 1.65;
  }

  h1, h2, h3, h4, h5, h6, .page-title, .hero-title, .info-title, .form-card-title, .position-title { font-weight: 800; }

  @media (hover: none), (pointer: coarse) {
    body { cursor: auto; }
    .cursor, .cursor-ring { display: none !important; }
  }

  @media (max-width: 1024px) {
    .page-title, .hero-title { font-size: clamp(1.9rem, 6vw, 3.4rem); }
    .page-sub, .info-text, .form-label, .position-desc { font-size: 1rem; }
    body {
      color: var(--p8);
      overflow-x: hidden;
      cursor: none;
    }
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .cursor {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    width: 12px; height: 12px; background: var(--p6); border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, background 0.3s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998;
    width: 36px; height: 36px; border: 1px solid rgba(168,127,232,0.5);
    border-radius: 50%; transform: translate(-50%, -50%);
    transition: transform 0.25s var(--easing), width 0.4s, height 0.4s, border-color 0.3s;
  }
  body:has(a:hover) .cursor, body:has(button:hover) .cursor { width: 20px; height: 20px; background: var(--gold); }
  body:has(a:hover) .cursor-ring, body:has(button:hover) .cursor-ring { width: 56px; height: 56px; border-color: var(--gold); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 3rem 1rem 4px;
    backdrop-filter: blur(24px);
    background: rgba(13,8,24,0.55);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
    animation: fadeDown 1s var(--easing) both;
  }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }

  .logo { display: flex; align-items: center; margin-left: 10px; }
  .logo img { display: block; height: 3.2rem; width: auto; transform: none; }

  .nav-links { display: flex; gap: 1rem; list-style: none; }
  .nav-links a {
    font-family: var(--font-ui); color: var(--p7); text-decoration: none;
    font-size: 0.82rem; letter-spacing: 0.06em; position: relative; transition: color 0.3s;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px;
    background: var(--gold); transform: scaleX(0); transform-origin: right;
    transition: transform 0.4s var(--easing);
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }

  .nav-cta {
    font-family: var(--font-ui); padding: 0.55rem 1.4rem;
    border: 1px solid var(--p5); background: transparent; color: var(--p7);
    font-size: 0.8rem; letter-spacing: 0.06em; cursor: none; border-radius: 2px;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .nav-cta::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--p4), var(--rose));
    opacity: 0; transition: opacity 0.3s;
  }
  .nav-cta:hover::before { opacity: 1; }
  .nav-cta span { position: relative; z-index: 1; }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; z-index: 600; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--p7); border-radius: 2px; transition: all 0.3s var(--easing); }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-nav {
    display: none; position: fixed; inset: 0; z-index: 490;
    background: rgba(13, 8, 24, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 1.4rem;
    opacity: 0; transform: translateY(-8px);
    pointer-events: none;
    transition: opacity 0.35s var(--easing), transform 0.35s var(--easing);
  }
  .mobile-nav.open {
    display: flex; opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .mobile-nav a {
    font-family: var(--font-ui); font-size: 1.4rem; color: var(--p7);
    text-decoration: none; letter-spacing: 0.08em; transition: color 0.3s;
    padding: 0.5rem 2rem; border-bottom: 1px solid rgba(123,85,212,0.2);
    width: 100%; text-align: center;
  }
  .mobile-nav a:hover { color: var(--gold); }

  .page-hero {
    padding: 7rem 2rem 2.5rem;
    background: linear-gradient(180deg, var(--p2) 0%, var(--p1) 100%);
    position: relative; overflow: hidden; text-align: center;
  }
  .page-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(75,47,163,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(75,47,163,0.07) 1px,transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
  }
  .page-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; top: -80px; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle,rgba(75,47,163,0.5) 0%,rgba(232,111,163,0.2) 50%,transparent 70%); }
  .page-hero-content { position: relative; z-index: 2; }
  .page-label { display: inline-flex; align-items: center; gap: 0.6rem; font-family: var(--font-ui); font-size: 0.7rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 1rem; }
  .page-label::before, .page-label::after { content: ''; display: block; width: 20px; height: 1px; background: var(--gold); }
  .page-title { font-family: var(--font-title); font-size: clamp(2rem,5vw,3.5rem); font-weight: 700; letter-spacing: 0.04em; background: linear-gradient(135deg,var(--gold),var(--p7),var(--p6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.8rem; }
  .page-sub { font-family: var(--font-body); color: var(--p6); font-size: 0.95rem; letter-spacing: 0.06em; }

  .content-section {
    max-width: 1100px; margin: 0 auto; padding: 3rem 2rem;
  }

  .info-card {
    background: linear-gradient(135deg, rgba(29,14,58,0.9), rgba(45,27,107,0.5));
    border: 1px solid rgba(123,85,212,0.25); border-radius: 12px;
    padding: 2rem; margin-bottom: 2rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .info-title { font-family: var(--font-title); font-size: 1.2rem; font-weight: 700; color: var(--gold); margin-bottom: 1rem; }
  .info-text { font-family: var(--font-body); font-size: 0.95rem; line-height: 1.8; color: var(--p7); }

  .positions-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;
  }

  .position-card {
    background: linear-gradient(135deg, rgba(75,47,163,0.2), rgba(232,111,163,0.1));
    border: 1px solid rgba(123,85,212,0.25); border-radius: 10px;
    padding: 1.5rem; transition: all 0.3s var(--easing);
  }
  .position-card:hover {
    background: linear-gradient(135deg, rgba(75,47,163,0.3), rgba(232,111,163,0.15));
    border-color: var(--gold); transform: translateY(-4px);
    cursor: pointer;
  }

  .position-card.selected {
    border-color: #a0f0c0;
    box-shadow: 0 0 0 2px rgba(160,240,192,0.18);
    background: linear-gradient(135deg, rgba(75,47,163,0.35), rgba(232,111,163,0.18));
  }

  .position-title { font-family: var(--font-title); font-size: 1rem; font-weight: 700; color: var(--gold); margin-bottom: 0.5rem; }
  .position-desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--p6); line-height: 1.6; margin-bottom: 1rem; }
  .position-tag { display: inline-block; padding: 0.3rem 0.7rem; background: rgba(123,85,212,0.2); border-radius: 4px; font-size: 0.75rem; color: white; font-weight: 500; margin-right: 0.5rem; margin-bottom: 0.5rem; }

  .position-link { display: inline-block; margin-top: 0.75rem; padding: 0.5rem 1.2rem; background: linear-gradient(135deg, var(--p4), var(--rose)); color: white; text-decoration: none; border-radius: 4px; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; transition: all 0.3s var(--easing); font-family: var(--font-ui); }
  .position-link:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(75,47,163,0.4); }

  .form-card {
    background: linear-gradient(135deg, rgba(29,14,58,0.92), rgba(45,27,107,0.65));
    border: 1px solid rgba(123,85,212,0.25);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 12px 36px rgba(0,0,0,0.18);
    margin-bottom: 2rem;
  }

  .form-card-title {
    font-family: var(--font-title);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 1.25rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  .form-group { display: flex; flex-direction: column; gap: 0.6rem; }
  .form-group.full { grid-column: 1 / -1; }

  .form-label {
    color: var(--p6);
    font-size: 0.9rem;
  }

  .form-input,
  .form-select,
  .form-textarea {
    width: 100%;
    border: 1px solid rgba(123,85,212,0.35);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--p8);
    font: inherit;
    padding: 0.95rem 1rem;
    transition: border-color 0.3s, background 0.3s;
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255,255,255,0.08);
  }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.9rem;
    margin-top: 1.2rem;
  }

  .btn-submit {
    padding: 0.85rem 1.5rem;
    background: linear-gradient(135deg, var(--p4), var(--rose));
    border: none;
    border-radius: 999px;
    color: white;
    font-family: var(--font-ui);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(232,111,163,0.25); }

  .form-note {
    margin-top: 0.85rem;
    color: var(--p5);
    font-size: 0.9rem;
  }

  .empty-card {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    padding: 1.5rem;
    color: var(--p6);
    border: 1px dashed rgba(123,85,212,0.4);
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
  }

  footer { padding: 2.5rem 2rem; text-align: center; border-top: 1px solid rgba(75,47,163,0.2); }
  .footer-copy { font-family: var(--font-body); font-size: 0.73rem; color: var(--p5); letter-spacing: 0.06em; }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem 1rem 2px; background: rgba(13,8,24,0.96); }
    .logo { margin-left: 5px; }
    .logo img { height: 1.92rem; }
    .nav-links, .nav-cta { display: none; }
    .hamburger { display: flex; }
    body { cursor: auto; }
    .cursor, .cursor-ring { display: none; }
    .logo img { transform: translateX(0); }
    .page-hero { padding: 7rem 1.25rem 3rem; }
    .positions-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .content-section { padding: 2rem 1.25rem; }
  }
</style>
</head>

<div class="page-hero">
  <div class="page-orb"></div>
  <div class="page-hero-content">
    <div class="page-label">加入我们</div>

    <p class="page-sub">诚邀优秀的学生加入运营团队，共同为校园服务</p>
  </div>
</div>

<div class="content-section">
  <div class="info-card">
    <div class="info-title">📋 关于本岗位</div>
    <div class="info-text">南渝万能墙是一个致力于为学生服务的校园平台，我们诚邀热心、有想法、有执行力的同学加入我们的运营团队。通过参与平台的日常运营，你将获得宝贵的团队协作、项目管理和沟通能力。</div>
  </div>

    <h2 style="font-family: var(--font-title); font-size: 1.3rem; color: var(--gold); margin-bottom: 1.5rem;">🎯 招聘岗位</h2>
    <div class="positions-grid" id="positionsTable">
      <div class="empty-card">招聘岗位加载中，请稍候。</div>
    </div>

  <div class="form-card">

        <input type="text" class="form-input" id="applicantName" placeholder="请输入姓名" />
      </div>
      <div class="form-group">
        <label class="form-label" for="applicantPosition">意向岗位</label>
        <select class="form-select" id="applicantPosition">
          <option value="">请选择意向岗位</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="applicantQQ">联系方式（QQ）</label>
        <input type="text" class="form-input" id="applicantQQ" placeholder="请输入QQ号" />
      </div>
      <div class="form-group full">
        <label class="form-label" for="applicantNote">备注（选填）</label>
        <textarea class="form-textarea" id="applicantNote" placeholder="如有特殊时间、技能或期望可以填写" rows="4"></textarea>

      <button class="btn-submit" id="recruitSubmitBtn" onclick="submitRecruitApplication()">提交报名</button>
    </div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function animCursor(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;cursor.style.left=mx+'px';cursor.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);})();

function toggleMobileNav(){const n=document.getElementById('mobileNav'),b=document.getElementById('hamburger');n.classList.toggle('open');b.classList.toggle('open');}
function closeMobileNav(){document.getElementById('mobileNav').classList.remove('open');document.getElementById('hamburger').classList.remove('open');}

const RECRUIT_API_ENDPOINT = '/api/recruitments';
const RECRUIT_APPLICANT_API_ENDPOINT = '/api/recruit-applicants';
let recruitPositions = [];
let recruitSelectedId = null;

function setRecruitSelected(positionId) {
  recruitSelectedId = positionId;
  const select = document.getElementById('applicantPosition');
  if (select) select.value = positionId || '';
  document.querySelectorAll('.position-card').forEach(card => {
    card.classList.toggle('selected', String(card.dataset.positionId) === String(positionId));
  });
  if (positionId) {
    const position = recruitPositions.find(item => String(item.id) === String(positionId));
    const noteEl = document.getElementById('recruitFormNote');
    if (position && noteEl) {
      noteEl.textContent = `已选择岗位：${position.title}，请完成报名信息后提交。 `;
      noteEl.style.color = '#a0f0c0';
    }
  }
}

async function loadRecruitPositions(){
  const container = document.getElementById('positionsTable');
  const select = document.getElementById('applicantPosition');
  container.innerHTML = '<div class="empty-card">招聘岗位加载中...</div>';
  if (select) select.innerHTML = '<option value="">加载中，请稍候…</option>';

  try {
    const res = await fetch(RECRUIT_API_ENDPOINT);
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `HTTP ${res.status}`);
    const json = await res.json();
    recruitPositions = Array.isArray(json.data) ? json.data : [];

    if (!recruitPositions.length) {
      container.innerHTML = '<div class="empty-card">当前暂无招聘岗位，请稍后关注。</div>';
      if (select) select.innerHTML = '<option value="">当前无岗位可选</option>';
      return;
    }

    container.innerHTML = recruitPositions.map(item => `
      <div class="position-card" data-position-id="${escapeAttr(item.id)}" onclick="setRecruitSelected('${escapeAttr(item.id)}')">
        <div class="position-title">${escapeHtml(item.title)}</div>
        <div class="position-desc">${escapeHtml(item.description)}</div>
        ${item.tags ? item.tags.split(',').map(tag => `<span class="position-tag">${escapeHtml(tag.trim())}</span>`).join('') : ''}
        ${item.apply_url ? `<a class="position-link" href="${escapeAttr(item.apply_url)}" target="_blank" rel="noreferrer">立即报名</a>` : ''}
      </div>
    `).join('');

    if (select) {
      select.innerHTML = '<option value="">请选择意向岗位</option>' + recruitPositions.map(item => `
        <option value="${escapeAttr(item.id)}">${escapeHtml(item.title)}</option>
      `).join('');
    }
  } catch (err) {
    container.innerHTML = '<div class="empty-card">招聘岗位加载失败，请稍后刷新。</div>';
    if (select) select.innerHTML = '<option value="">加载失败</option>';
    console.warn('招贤纳士数据加载失败：', err);
  }
}

async function submitRecruitApplication(){
  const name = document.getElementById('applicantName').value.trim();
  const positionId = document.getElementById('applicantPosition').value;
  const qq = document.getElementById('applicantQQ').value.trim();
  const note = document.getElementById('applicantNote').value.trim();
  const noteEl = document.getElementById('recruitFormNote');
  const btn = document.getElementById('recruitSubmitBtn');

  function setNote(msg, status = 'error') {
    noteEl.textContent = msg;
    noteEl.style.color = status === 'success' ? '#a0f0c0' : '#ffb3b3';
  }

  if (!name) { setNote('请输入姓名'); return; }
  if (!positionId) { setNote('请选择意向岗位'); return; }
  if (!qq) { setNote('请输入QQ联系方式'); return; }

  const position = recruitPositions.find(item => String(item.id) === String(positionId));
  if (!position) { setNote('请选择有效的意向岗位'); return; }

  btn.disabled = true;
  btn.textContent = '提交中…';
  setNote('正在提交，请稍候…', 'info');

  try {
    const res = await fetch(RECRUIT_APPLICANT_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        position_id: position.id,
        position_title: position.title,
        qq,
        note
      })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);

    document.getElementById('applicantName').value = '';
    document.getElementById('applicantPosition').value = '';
    document.getElementById('applicantQQ').value = '';
    document.getElementById('applicantNote').value = '';
    setNote('报名提交成功，我们会尽快与你联系', 'success');
  } catch (err) {
    setNote('提交失败：' + (err.message || '请稍后重试'));
  } finally {
    btn.disabled = false;
    btn.textContent = '提交报名';
  }
}

function escapeHtml(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeAttr(str) { return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadRecruitPositions();
</script>
</body>
</html>
